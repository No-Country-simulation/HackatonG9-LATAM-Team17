spring.application.name=finanzas
server.port:8000
# ===================================================================
# CONFIGURACIÓN DE CONEXIÓN A POSTGRESQL
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Controlador oficial de PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
# ddl-auto=update: Spring Boot creará o actualizará las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola las sentencias SQL reales
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
